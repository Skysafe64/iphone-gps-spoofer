<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Spoofer GPS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }

    .panel {
      position: absolute; top: 12px; left: 12px; z-index: 1000;
      background: rgba(255,255,255,.95); backdrop-filter: blur(8px);
      border-radius: 14px; padding: 12px 14px; box-shadow: 0 4px 20px rgba(0,0,0,.18);
      width: 250px; font-size: 14px; max-height: calc(100% - 24px); overflow-y: auto;
    }
    .panel h1 { margin: 0 0 6px; font-size: 15px; }
    .status { font-size: 12px; color: #667; margin-bottom: 8px; }
    .status b.ok { color: #0a5c2b; } .status b.err { color: #a01818; }
    .coords { font-variant-numeric: tabular-nums; font-size: 13px; color: #333;
              background: #f2f4f7; border-radius: 8px; padding: 6px 8px; margin-bottom: 8px; }
    .hint { font-size: 12px; color: #889; margin-bottom: 10px; }
    button { font-size: 14px; border: 0; border-radius: 9px; cursor: pointer; }
    .clear { background: #eef0f3; color: #333; padding: 9px 12px; width: 100%; }
    .clear:active { background: #e2e5ea; }

    .search { display: flex; gap: 6px; margin-bottom: 6px; }
    .search input { flex: 1; font-size: 14px; padding: 8px 10px; border: 1px solid #ccd;
                    border-radius: 8px; min-width: 0; }
    .search button { background: #0a84ff; border: 0; border-radius: 8px; padding: 8px 10px;
                     cursor: pointer; }
    ul.results { list-style: none; margin: 0 0 8px; padding: 0; }
    ul.results li { padding: 8px; border-radius: 8px; cursor: pointer; font-size: 13px;
                    line-height: 1.3; }
    ul.results li:hover { background: #eef4ff; }
    ul.results li:active { background: #dde9ff; }

    .section-title { font-size: 12px; font-weight: 600; color: #556;
                     text-transform: uppercase; letter-spacing: .04em;
                     margin: 14px 0 6px; }
    ul.favs { list-style: none; margin: 0 0 8px; padding: 0; }
    ul.favs li { display: flex; align-items: center; gap: 6px; padding: 6px 0;
                 border-bottom: 1px solid #eef0f3; }
    ul.favs li:last-child { border-bottom: 0; }
    .fav-go { flex: 1; text-align: left; background: transparent; padding: 4px 2px;
              display: flex; flex-direction: column; }
    .fav-go .n { font-weight: 500; color: #1a1a1a; }
    .fav-go .c { font-size: 11px; color: #99a; font-variant-numeric: tabular-nums; }
    .fav-go:active { opacity: .5; }
    .fav-del { background: transparent; color: #c33; font-size: 16px; padding: 4px 6px; }
    .fav-empty { font-size: 12px; color: #99a; padding: 4px 0 8px; }
    .fav-add { display: flex; gap: 6px; }
    .fav-add input { flex: 1; font-size: 13px; padding: 8px; border: 1px solid #ccd;
                     border-radius: 8px; min-width: 0; }
    .fav-add button { background: #0a84ff; color: #fff; padding: 8px 12px; }

    .joy-speed { display: flex; gap: 4px; margin-bottom: 8px; }
    .joy-speed button { flex: 1; padding: 6px 0; background: #eef0f3; color: #333;
                        border-radius: 8px; font-size: 12px; }
    .joy-speed button.active { background: #0a84ff; color: #fff; }
    .joy { position: relative; width: 130px; height: 130px; margin: 0 auto;
           border-radius: 50%; background: radial-gradient(circle at 50% 50%, #eef1f6, #dde2ea);
           box-shadow: inset 0 2px 6px rgba(0,0,0,.15); touch-action: none;
           cursor: grab; }
    .joy-knob { position: absolute; top: 50%; left: 50%; width: 48px; height: 48px;
                margin: -24px 0 0 -24px; border-radius: 50%; background: #0a84ff;
                box-shadow: 0 3px 8px rgba(10,132,255,.5); transition: box-shadow .15s;
                pointer-events: none; }
    .joy.active { cursor: grabbing; }
    .joy.active .joy-knob { box-shadow: 0 5px 14px rgba(10,132,255,.7); }

    .route-speed { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .route-speed input[type=range] { flex: 1; accent-color: #0a84ff; }
    .route-speed span { font-size: 12px; font-variant-numeric: tabular-nums; color: #333;
                        min-width: 56px; text-align: right; }
    .route-info { font-size: 12px; color: #333; background: #f2f4f7; border-radius: 8px;
                  padding: 8px; margin: 8px 0; white-space: pre-wrap; line-height: 1.4; }
    .route-actions { display: flex; gap: 6px; }
    .route-actions .route-go { flex: 1; background: #22a06b; color: #fff; padding: 9px 12px; }
    .route-actions .route-go:active { background: #1c8a5b; }
    .route-actions .clear { flex: 0 0 auto; }

    .toast {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(20,20,22,.9); color: #fff; padding: 10px 16px;
      border-radius: 10px; font-size: 14px; opacity: 0; transition: opacity .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .pin {
      width: 20px; height: 20px; border-radius: 50% 50% 50% 0;
      background: #0a84ff; transform: rotate(-45deg);
      border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <h1>📍 Spoofer GPS</h1>

    <div class="search">
      <input id="q" placeholder="Rechercher un lieu…" autocomplete="off">
      <button onclick="doSearch()" title="Rechercher">🔍</button>
    </div>
    <ul class="results" id="results"></ul>

    <div class="status">Session : <b id="conn">…</b></div>
    <div class="coords" id="coords">Aucune position posée</div>
    <div class="hint">Clique sur la carte pour t'y téléporter.</div>
    <button class="clear" onclick="clearLoc()">Revenir au vrai GPS</button>

    <div class="section-title">🕹️ Joystick temps réel</div>
    <div class="joy-speed" id="joySpeed">
      <button data-kmh="5" class="active">🚶 5</button>
      <button data-kmh="12">🏃 12</button>
      <button data-kmh="25">🚴 25</button>
      <button data-kmh="60">🚗 60</button>
    </div>
    <div class="joy" id="joy"><div class="joy-knob" id="joyKnob"></div></div>
    <div class="hint" style="text-align:center; margin-top:6px">Maintiens et pousse dans une direction.</div>

    <div class="section-title">🛣️ Mode route</div>
    <div class="route-speed">
      <input type="range" id="routeSlider" min="1" max="120" value="30">
      <span id="routeSpeedLabel">30 km/h</span>
    </div>
    <button class="clear" id="routeDefineBtn" onclick="routeDefine()">Définir un trajet (A → B)</button>
    <div id="routeInfo" class="route-info" style="display:none"></div>
    <div class="route-actions" id="routeActions" style="display:none">
      <button class="route-go" id="routeGoBtn" onclick="routeToggle()">▶︎ Démarrer</button>
      <button class="clear" onclick="routeReset()">Effacer</button>
    </div>

    <div class="section-title">⭐ Favoris</div>
    <ul class="favs" id="favList"></ul>
    <div class="fav-add">
      <input id="favName" placeholder="Nom du lieu actuel">
      <button onclick="addFav()">＋</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { zoomControl: true }).setView([46.6, 2.4], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const pinIcon = L.divIcon({ className: '', html: '<div class="pin"></div>',
                                iconSize: [20, 20], iconAnchor: [10, 20] });
    let marker = null;
    let current = null;   // {lat, lng} de la position posée

    let toastTimer = null;
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
    }

    function drawMarker(lat, lng) {
      if (marker) marker.setLatLng([lat, lng]);
      else marker = L.marker([lat, lng], { icon: pinIcon }).addTo(map);
      current = { lat, lng };
      document.getElementById('coords').textContent =
        `📌 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    }
    function removeMarker() {
      if (marker) { map.removeLayer(marker); marker = null; }
      current = null;
      document.getElementById('coords').textContent = 'Aucune position posée';
    }

    async function poll() {
      const el = document.getElementById('conn');
      try {
        const j = await (await fetch('/status')).json();
        el.textContent = j.connected ? 'ouverte' : 'fermée';
        el.className = j.connected ? 'ok' : 'err';
        // Source de vérité serveur → pin identique sur tous les appareils.
        // Pause pendant qu'on manie le joystick localement (évite les saccades).
        if (!joyActive) {
          if (j.current) drawMarker(j.current.lat, j.current.lng);
          else if (marker) removeMarker();
        }
        // Progression du trajet (mode route)
        const acts = document.getElementById('routeActions');
        if (j.trip && acts && acts.style.display !== 'none') {
          showRouteInfo(j.trip.total, j.trip.traveled);
          const b = document.getElementById('routeGoBtn');
          if (j.trip.running) { routePlaying = true; b.textContent = '⏹ Arrêter'; }
          else {
            if (routePlaying) toast('Arrivé à destination ✓');
            routePlaying = false; b.textContent = '▶︎ Démarrer';
          }
        }
      } catch (e) {
        el.textContent = 'backend injoignable'; el.className = 'err';
      }
    }

    async function pushLoc(lat, lng, opts = {}) {
      try {
        const j = await (await fetch('/set', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lat, lng })
        })).json();
        if (!j.ok) { toast('Erreur : ' + j.error); return false; }
        drawMarker(lat, lng);
        if (opts.follow) map.panTo([lat, lng], { animate: true, duration: 0.2 });
        if (opts.toast) toast('Position posée ✓');
        return true;
      } catch (e) { toast('Erreur réseau'); return false; }
    }

    // Clic carte / favori / recherche : pose ponctuelle (avec toast)
    function setLoc(lat, lng) { return pushLoc(lat, lng, { toast: true }); }

    async function clearLoc() {
      try {
        const j = await (await fetch('/clear', { method: 'POST' })).json();
        if (!j.ok) return toast('Erreur : ' + j.error);
        removeMarker();
        toast('Retour au vrai GPS ✓');
      } catch (e) { toast('Erreur réseau'); }
    }

    // --- Favoris ---
    async function loadFavs() {
      let favs = [];
      try { favs = await (await fetch('/favorites')).json(); } catch (e) {}
      const ul = document.getElementById('favList');
      ul.innerHTML = '';
      if (!favs.length) {
        ul.innerHTML = '<div class="fav-empty">Aucun favori. Pose une position puis nomme-la ci-dessous.</div>';
        return;
      }
      for (const f of favs) {
        const li = document.createElement('li');

        const go = document.createElement('button');
        go.className = 'fav-go';
        go.innerHTML = `<span class="n">${escapeHtml(f.name)}</span>` +
                       `<span class="c">${f.lat.toFixed(4)}, ${f.lng.toFixed(4)}</span>`;
        go.onclick = () => { map.setView([f.lat, f.lng], Math.max(map.getZoom(), 12)); setLoc(f.lat, f.lng); };

        const del = document.createElement('button');
        del.className = 'fav-del'; del.textContent = '×'; del.title = 'Supprimer';
        del.onclick = async (e) => {
          e.stopPropagation();
          await fetch('/favorites/' + f.id, { method: 'DELETE' });
          loadFavs();
        };

        li.appendChild(go); li.appendChild(del);
        ul.appendChild(li);
      }
    }

    async function addFav() {
      if (!current) return toast('Pose d\'abord une position sur la carte.');
      const input = document.getElementById('favName');
      const name = input.value.trim();
      if (!name) return toast('Donne un nom au lieu.');
      const j = await (await fetch('/favorites', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, lat: current.lat, lng: current.lng })
      })).json();
      if (!j.ok) return toast('Erreur : ' + j.error);
      input.value = '';
      loadFavs();
      toast('Favori ajouté ✓');
    }

    // --- Recherche par nom ---
    async function doSearch() {
      const q = document.getElementById('q').value.trim();
      const ul = document.getElementById('results');
      if (!q) { ul.innerHTML = ''; return; }
      ul.innerHTML = '<li style="cursor:default;color:#99a">Recherche…</li>';
      let res;
      try { res = await (await fetch('/search?q=' + encodeURIComponent(q))).json(); }
      catch (e) { ul.innerHTML = '<li style="cursor:default;color:#a01818">Erreur réseau</li>'; return; }
      if (!Array.isArray(res)) { ul.innerHTML = '<li style="cursor:default;color:#a01818">Erreur de recherche</li>'; return; }
      if (!res.length) { ul.innerHTML = '<li style="cursor:default;color:#99a">Aucun résultat</li>'; return; }
      ul.innerHTML = '';
      for (const r of res) {
        const li = document.createElement('li');
        li.textContent = r.name;
        li.onclick = () => {
          map.setView([r.lat, r.lng], Math.max(map.getZoom(), 13));
          setLoc(r.lat, r.lng);
          ul.innerHTML = '';
          document.getElementById('q').value = '';
        };
        ul.appendChild(li);
      }
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    map.on('click', (e) => {
      if (routeSelecting) handleRouteClick(e.latlng);
      else setLoc(e.latlng.lat, e.latlng.lng);
    });

    // --- Joystick temps réel ---
    const JOY_INTERVAL = 200;            // ms entre deux pas
    const joyEl = document.getElementById('joy');
    const knobEl = document.getElementById('joyKnob');
    let joyVec = { x: 0, y: 0 };          // normalisé -1..1
    let joyActive = false;                // vrai tant qu'on maintient
    let speedKmh = 5;
    let joyInflight = false;              // évite d'empiler les requêtes

    document.getElementById('joySpeed').addEventListener('click', (e) => {
      const b = e.target.closest('button'); if (!b) return;
      speedKmh = parseFloat(b.dataset.kmh);
      [...e.currentTarget.children].forEach(c => c.classList.toggle('active', c === b));
    });

    function joySet(clientX, clientY) {
      const r = joyEl.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      const R = r.width / 2 - 8;
      let dx = clientX - cx, dy = clientY - cy;
      const dist = Math.hypot(dx, dy);
      if (dist > R) { dx = dx / dist * R; dy = dy / dist * R; }
      knobEl.style.transform = `translate(${dx}px, ${dy}px)`;
      joyVec = { x: dx / R, y: dy / R };
    }
    function joyReset() {
      joyActive = false; joyVec = { x: 0, y: 0 };
      knobEl.style.transform = 'translate(0,0)';
      joyEl.classList.remove('active');
    }
    joyEl.addEventListener('pointerdown', (e) => {
      joyActive = true; joyEl.classList.add('active');
      joyEl.setPointerCapture(e.pointerId); joySet(e.clientX, e.clientY);
    });
    joyEl.addEventListener('pointermove', (e) => { if (joyActive) joySet(e.clientX, e.clientY); });
    joyEl.addEventListener('pointerup', joyReset);
    joyEl.addEventListener('pointercancel', joyReset);

    async function joyTick() {
      const mag = Math.hypot(joyVec.x, joyVec.y);
      if (mag < 0.06 || joyInflight) return;
      if (!current) { const c = map.getCenter(); current = { lat: c.lat, lng: c.lng }; }
      const stepM = (speedKmh * 1000 / 3600) * (JOY_INTERVAL / 1000) * Math.min(mag, 1);
      const north = -joyVec.y, east = joyVec.x;     // écran : haut = nord
      const dLat = (north * stepM) / 111320;
      const dLng = (east * stepM) / (111320 * Math.cos(current.lat * Math.PI / 180));
      joyInflight = true;
      await pushLoc(current.lat + dLat, current.lng + dLng, { follow: true });
      joyInflight = false;
    }
    setInterval(joyTick, JOY_INTERVAL);

    // --- Mode route ---
    let routeSelecting = false, routePlaying = false;
    let ptA = null, ptB = null, mA = null, mB = null, routeLine = null;
    let routeSpeedKmh = 30, routeDist = 0;

    function flagIcon(color) {
      return L.divIcon({ className: '', iconSize: [20, 20], iconAnchor: [10, 20],
        html: `<div class="pin" style="background:${color}"></div>` });
    }

    document.getElementById('routeSlider').addEventListener('input', (e) => {
      routeSpeedKmh = parseFloat(e.target.value);
      document.getElementById('routeSpeedLabel').textContent = routeSpeedKmh + ' km/h';
      if (routeDist && !routePlaying) showRouteInfo(routeDist, null);
      if (routePlaying) fetch('/route/speed', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ speed_kmh: routeSpeedKmh })
      });
    });

    function routeDefine() {
      routeReset();
      routeSelecting = true;
      document.getElementById('routeDefineBtn').textContent = '① Clique le DÉPART sur la carte…';
    }

    function handleRouteClick(latlng) {
      const btn = document.getElementById('routeDefineBtn');
      if (!ptA) {
        ptA = { lat: latlng.lat, lng: latlng.lng };
        mA = L.marker([ptA.lat, ptA.lng], { icon: flagIcon('#22a06b') }).addTo(map);
        btn.textContent = '② Clique l\'ARRIVÉE…';
      } else {
        ptB = { lat: latlng.lat, lng: latlng.lng };
        mB = L.marker([ptB.lat, ptB.lng], { icon: flagIcon('#e5484d') }).addTo(map);
        routeSelecting = false;
        btn.textContent = 'Définir un trajet (A → B)';
        previewRoute();
      }
    }

    async function previewRoute() {
      const info = document.getElementById('routeInfo');
      info.style.display = 'block'; info.textContent = 'Calcul du trajet…';
      try {
        const j = await (await fetch('/route/preview', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from: ptA, to: ptB, profile: 'driving', speed_kmh: routeSpeedKmh })
        })).json();
        if (!j.ok) { info.textContent = 'Erreur : ' + j.error; return; }
        routeDist = j.distance;
        drawRoute(j.coords);
        showRouteInfo(j.distance, null);
        document.getElementById('routeActions').style.display = 'flex';
      } catch (e) { info.textContent = 'Erreur réseau'; }
    }

    function drawRoute(coords) {
      if (routeLine) map.removeLayer(routeLine);
      routeLine = L.polyline(coords, { color: '#0a84ff', weight: 4, opacity: .7 }).addTo(map);
      map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
    }

    function showRouteInfo(distM, traveledM) {
      const km = (distM / 1000).toFixed(2);
      const mins = Math.round(distM / (routeSpeedKmh * 1000 / 3600) / 60);
      let txt = `📏 ${km} km · ~${mins} min à ${routeSpeedKmh} km/h`;
      if (traveledM != null) txt += `\n▶︎ ${(traveledM / 1000).toFixed(2)} / ${km} km parcourus`;
      document.getElementById('routeInfo').textContent = txt;
    }

    async function routeToggle() {
      const btn = document.getElementById('routeGoBtn');
      if (!routePlaying) {
        if (!ptA || !ptB) return toast('Définis d\'abord un trajet.');
        try {
          const j = await (await fetch('/route/play', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ speed_kmh: routeSpeedKmh })
          })).json();
          if (!j.ok) return toast('Erreur : ' + j.error);
          routePlaying = true; btn.textContent = '⏹ Arrêter';
          toast('En route ✓');
        } catch (e) { toast('Erreur réseau'); }
      } else {
        await fetch('/route/pause', { method: 'POST' });
        routePlaying = false; btn.textContent = '▶︎ Démarrer';
        toast('En pause');
      }
    }

    function routeReset() {
      fetch('/route/reset', { method: 'POST' });
      routePlaying = false;
      routeSelecting = false;
      ptA = ptB = null; routeDist = 0;
      if (mA) { map.removeLayer(mA); mA = null; }
      if (mB) { map.removeLayer(mB); mB = null; }
      if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
      document.getElementById('routeInfo').style.display = 'none';
      document.getElementById('routeActions').style.display = 'none';
      document.getElementById('routeDefineBtn').textContent = 'Définir un trajet (A → B)';
      document.getElementById('routeGoBtn').textContent = '▶︎ Démarrer';
    }

    document.getElementById('q').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    poll(); setInterval(poll, 2500);
    loadFavs();
  </script>
</body>
</html>
